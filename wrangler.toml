name = "owbastion-codes-api"
main = "apps/api/src/worker.ts"
compatibility_date = "2026-07-14"

[observability]
enabled = false

[[d1_databases]]
binding = "DB"
database_name = "owbastion-codes-local"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "EVIDENCE_BUCKET"
bucket_name = "owbastion-codes-evidence"
