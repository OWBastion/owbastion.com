name = "owbastion-codes-api"
main = "apps/api/src/worker.ts"
compatibility_date = "2026-07-14"
workers_dev = false

[vars]
PORTAL_ORIGIN = "https://owbastion.com"
OCRKIT_EVIDENCE_BUCKET = "owbastion-codes-evidence"

[[routes]]
pattern = "api.owbastion.com"
custom_domain = true

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "owbastion-codes-prod"
database_id = "40fb80aa-f17e-467d-9d4d-b8b3100b141d"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "EVIDENCE_BUCKET"
bucket_name = "owbastion-codes-evidence"

[[queues.producers]]
binding = "OCR_QUEUE"
queue = "owbastion-ocr"

[[queues.consumers]]
queue = "owbastion-ocr"
max_batch_size = 1
max_retries = 3

[placement]
mode = "smart"
