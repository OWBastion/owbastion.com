services:
  portal:
    image: >-
      ghcr.io/owbastion/owbastion.codes-portal:${PORTAL_IMAGE_TAG:?set
      PORTAL_IMAGE_TAG}
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE_URL: https://api.owbastion.com
    ports:
      - "127.0.0.1:${PORTAL_PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:3000/health').then((r) =>
          process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
