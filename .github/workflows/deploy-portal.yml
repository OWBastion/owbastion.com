name: Deploy Portal

'on':
  workflow_run:
    workflows: [Publish Portal image]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Portal image tag to deploy
        required: false
        default: latest
        type: string

concurrency:
  group: portal-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Update Portal Compose service
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Resolve Portal image tag
        id: image
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "workflow_run" ]]; then
            echo "tag=sha-${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            test -n "${{ inputs.image_tag }}"
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SSH_HOST"
          test -n "$SSH_PORT"
          test -n "$SSH_USER"
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_KNOWN_HOSTS"
          test -n "$DEPLOY_PATH"
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Update Portal Compose service
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          set -euo pipefail
          remote_command="$(printf 'set -euo pipefail\ncd %q\nexport PORTAL_IMAGE_TAG=%q\ndocker compose pull portal\ndocker compose up -d --wait portal\ndocker compose ps\n' "$DEPLOY_PATH" "$IMAGE_TAG")"
          ssh \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "bash -s" <<< "$remote_command"
