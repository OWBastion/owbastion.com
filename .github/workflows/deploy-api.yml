name: Deploy API

on:
  pull_request:
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'migrations/**'
      - 'wrangler.toml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - '.github/workflows/deploy-api.yml'
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'migrations/**'
      - 'wrangler.toml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  PNPM_VERSION: 11.11.0
  NODE_VERSION: 26

jobs:
  verify:
    name: Verify platform
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Run build
        run: pnpm run build

  deploy:
    name: Deploy Cloudflare Worker
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      QQBOT_API_TOKEN: ${{ secrets.QQBOT_API_TOKEN }}
      ADMIN_BATTLETAG: ${{ secrets.ADMIN_BATTLETAG }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate production resources
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$QQBOT_API_TOKEN"
          test -n "$ADMIN_BATTLETAG"
          if [[ "$ADMIN_BATTLETAG" =~ ^(.+)#([0-9]{1,10})$ ]]; then
            admin_player_name="${BASH_REMATCH[1]}"
            admin_player_id="${BASH_REMATCH[2]}"
          else
            echo "ADMIN_BATTLETAG must use the format Name#1234" >&2
            exit 1
          fi
          admin_player_name_normalized="${admin_player_name,,}"
          admin_player_name_normalized_sql="${admin_player_name_normalized//\'/\'\'}"
          echo "::add-mask::$admin_player_id"
          echo "::add-mask::$admin_player_name_normalized_sql"
          {
            echo "ADMIN_PLAYER_ID=$admin_player_id"
            echo "ADMIN_PLAYER_NAME_NORMALIZED_SQL=$admin_player_name_normalized_sql"
          } >> "$GITHUB_ENV"
          test "$(grep -c 'database_id = "00000000-0000-0000-0000-000000000000"' wrangler.toml)" -eq 0
          test "$(grep -c 'database_name = "owbastion-codes-prod"' wrangler.toml)" -eq 1

      - name: Ensure OCR queue exists
        shell: bash
        run: |
          set -euo pipefail
          queues="$(pnpm exec wrangler queues list)"
          if grep -Fq "owbastion-ocr" <<<"$queues"; then
            echo "OCR queue already exists"
          else
            pnpm exec wrangler queues create owbastion-ocr
          fi

      - name: Apply remote D1 migrations
        run: pnpm exec wrangler d1 migrations apply owbastion-codes-prod --remote

      - name: Validate administrator account
        shell: bash
        run: |
          set -euo pipefail
          result="$(pnpm exec wrangler d1 execute owbastion-codes-prod --remote --json --command "SELECT COUNT(*) AS count FROM player_accounts WHERE normalized_player_name = '$ADMIN_PLAYER_NAME_NORMALIZED_SQL' AND player_id = '$ADMIN_PLAYER_ID'")"
          test "$(printf '%s' "$result" | jq -r '.[0].results[0].count')" = "1"

      - name: Bootstrap administrator
        shell: bash
        run: pnpm exec wrangler d1 execute owbastion-codes-prod --remote --command "UPDATE player_accounts SET is_admin = 1, updated_at = CAST(strftime('%s','now') AS INTEGER) * 1000 WHERE normalized_player_name = '$ADMIN_PLAYER_NAME_NORMALIZED_SQL' AND player_id = '$ADMIN_PLAYER_ID'"

      - name: Deploy Worker
        run: pnpm exec wrangler deploy

      - name: Update Worker service secret
        shell: bash
        run: printf '%s' "$QQBOT_API_TOKEN" | pnpm exec wrangler secret put QQBOT_API_TOKEN

      - name: Publish API URL
        run: echo "::notice title=Cloudflare Worker deployed::https://api.owbastion.com"
