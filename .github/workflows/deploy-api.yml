name: Deploy API

on:
  pull_request:
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'migrations/**'
      - 'wrangler.toml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - '.github/workflows/deploy-api.yml'
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'migrations/**'
      - 'wrangler.toml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  PNPM_VERSION: 11.11.0
  NODE_VERSION: 26

jobs:
  verify:
    name: Verify platform
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Run build
        run: pnpm run build

  deploy:
    name: Deploy Cloudflare Worker
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      QQBOT_API_TOKEN: ${{ secrets.QQBOT_API_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate production resources
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$QQBOT_API_TOKEN"
          test "$(grep -c 'database_id = "00000000-0000-0000-0000-000000000000"' wrangler.toml)" -eq 0
          test "$(grep -c 'database_name = "owbastion-codes-prod"' wrangler.toml)" -eq 1

      - name: Apply remote D1 migrations
        run: pnpm exec wrangler d1 migrations apply owbastion-codes-prod --remote

      - name: Deploy Worker
        run: pnpm exec wrangler deploy

      - name: Update Worker service secret
        shell: bash
        run: printf '%s' "$QQBOT_API_TOKEN" | pnpm exec wrangler secret put QQBOT_API_TOKEN

      - name: Publish API URL
        run: echo "::notice title=Cloudflare Worker deployed::https://api.owbastion.com"
