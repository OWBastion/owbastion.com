name = "owbastion-codes-api-local"
main = "apps/api/src/worker.ts"
compatibility_date = "2026-07-14"
workers_dev = true

[vars]
PORTAL_ORIGIN = "http://localhost:3000"
LOCAL_DEV_AUTH = "true"
UPLOAD_ORIGIN = "http://localhost:8787"
OCRKIT_EVIDENCE_BUCKET = "owbastion-codes-evidence"

[[d1_databases]]
binding = "DB"
database_name = "owbastion-codes-prod"
database_id = "40fb80aa-f17e-467d-9d4d-b8b3100b141d"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "00000000-0000-0000-0000-000000000001"

[[r2_buckets]]
binding = "EVIDENCE_BUCKET"
bucket_name = "owbastion-codes-evidence"

[[queues.producers]]
binding = "OCR_QUEUE"
queue = "owbastion-ocr-local"

[[queues.producers]]
binding = "QQ_POLICY_QUEUE"
queue = "owbastion-qq-policy-local"

[[queues.consumers]]
queue = "owbastion-ocr-local"
max_batch_size = 1
max_retries = 3

[[queues.consumers]]
queue = "owbastion-qq-policy-local"
max_batch_size = 1
max_retries = 3
dead_letter_queue = "owbastion-qq-policy-local-dlq"

[triggers]
crons = ["*/5 * * * *"]
